#version: "3.9"

# ------------------------------------------------------------------
# AST3 — local dev / staging compose stack
# For production, replace image builds with pre-built images and
# add Podman-compatible rootless configuration.
# ------------------------------------------------------------------

x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: core.settings.dev
  DATABASE_URL: postgres://ast3:ast3dev@postgres:5432/ast3
  REDIS_URL: redis://redis:6379/0
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-s3cR3t_GenEr4t3d_v1_9zY8wQpLk2mN0bVx7Rt}
  ALLOWED_HOSTS: "localhost,192.168.1.55,backend"
  CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"

services:
  # ----------------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ast3
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ast3dev}
      POSTGRES_DB: ast3
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ast3"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # Redis
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # Django (Uvicorn ASGI)
  # ----------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ../backend:/app
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             uvicorn core.asgi:application --host 0.0.0.0 --port 8000 --workers 2"

  # ----------------------------------------------------------------
  # Celery worker
  # ----------------------------------------------------------------
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - media_data:/app/media
    depends_on:
      backend:
        condition: service_started
    command: celery -A core worker -l INFO -c 4 -Q celery,risks

  # ----------------------------------------------------------------
  # Celery beat (scheduler)
  # ----------------------------------------------------------------
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      backend:
        condition: service_started
    command: celery -A core beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ----------------------------------------------------------------
  # ClamAV antivirus (attachment scanning)
  # ----------------------------------------------------------------
  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    volumes:
      - clamav_db:/var/lib/clamav
    environment:
      CLAMD_CONF_MaxFileSize: 50M
      CLAMD_CONF_MaxScanSize: 100M

  # ----------------------------------------------------------------
  # Frontend (Vite dev server)
  # ----------------------------------------------------------------
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../client:/app
    ports:
      - "5173:5173"
    environment:
      VITE_GRAPHQL_URL: "/graphql/"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # ----------------------------------------------------------------
  # Nginx (reverse proxy)
  # ----------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - media_data:/var/www/media:ro
    depends_on:
      - backend
      - frontend

  # ----------------------------------------------------------------
  # Prometheus
  # ----------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.retention.time=30d

  # ----------------------------------------------------------------
  # Grafana
  # ----------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  media_data:
  clamav_db:
  prometheus_data:
  grafana_data:
