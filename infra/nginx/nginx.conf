worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers applied globally
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Hide server version
    server_tokens off;

    # Request size limits
    client_max_body_size 50M;
    client_body_timeout 30s;
    client_header_timeout 10s;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Logging
    log_format json_combined escape=json
        '{"time":"$time_iso8601","method":"$request_method",'
        '"uri":"$request_uri","status":$status,'
        '"bytes":$body_bytes_sent,"ip":"$remote_addr",'
        '"ua":"$http_user_agent","ref":"$http_referer"}';
    access_log /var/log/nginx/access.log json_combined;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ----------------------------------------------------------------
    # HTTP → HTTPS redirect
    # ----------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ----------------------------------------------------------------
    # HTTPS main server
    # ----------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # GraphQL API
        location /graphql/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Health / readiness probes (no rate limit, no auth)
        location ~ ^/(healthz|readyz)$ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }

        # Media files (uploaded attachments — served directly)
        location /media/ {
            alias /var/www/media/;
            expires 7d;
            add_header Cache-Control "private, max-age=604800";
        }

        # Grafana (sub-path)
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
        }

        # React SPA
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # SPA fallback
            try_files $uri $uri/ /index.html;
        }
    }
}
